/* ─── Helpers ───────────────────────────────────────────────── */
function compat(tech, doc) {
  const tl = tech.locs.map(normLoc);
  const dl = doc.locs.map(normLoc);
  const locOk  = tech.travel || dl.some(d => tl.includes(d));
  const needed = STYPES[doc.spec] || [];
  const typeOk = !needed.length || needed.some(n => tech.types.includes(n));
  return { locOk, typeOk, ok: locOk && typeOk };
}

function covStatus(docId, count) {
  const { min, target } = THRESHOLDS[docId] || { min: 2, target: 2 };
  if (count < min)     return { level:'danger', count, min, target };
  if (count < target)  return { level:'warn',   count, min, target };
  return                      { level:'ok',     count, min, target };
}

function BadgeLabel({ level, count, target }) {
  if (level === 'danger') return count === 0
    ? `Need ${target} — none assigned`
    : `${count}/${target} — need ${target - count} more`;
  if (level === 'warn') return `${count}/${target} — add ${target - count} more`;
  return `✓ ${count}/${target}`;
}

  /* schedule */

    updateDocs(p => p.map(d => {
      if (d.id!==docId) return d;
      const s = {...d.sched};
      const days = new Set(s[loc] ? s[loc].split(', ') : []);
      days.has(day) ? days.delete(day) : days.add(day);
      const ord = DAYS.filter(dd => days.has(dd));
      if (!ord.length) delete s[loc]; else s[loc] = ord.join(', ');
      return {...d, sched:s};
    }));
  };

  /* editable locations */

    updateDocs(p => p.map(d => {

      return {...d, locs: d.locs.filter(l=>l!==loc), sched};

    };

    e.target.value = '';

                      React.createElement('div', {className:'sched-loc-label'}, loc),
                      React.createElement('div', {className:'sched-days'},
                        DAYS.map(day => {
                          const on = (doc.sched[loc]||'').includes(day);
                          return React.createElement('button', {
                            key:day,
                            className:'day-btn'+(on?' on':''),
                            style:{background:on?s.a:'#fff',color:on?'#fff':'#6b7280',borderColor:on?s.a:'#d1d5db'},
                            onClick:()=>toggleSched(doc.id,loc,day)
                          },day);
                        })
                      )
                    )
                  )
                )
              ),

              /* team section */
              React.createElement('div', {className:'doc-team'},
                React.createElement('div', {className:'team-header'},
                  React.createElement('span', {className:'team-label'}, 'Team (',dt.length,')'),
                  React.createElement('span', {className:'team-progress', style:{color: cov.level==='ok'?'#059669':cov.level==='warn'?'#D97706':'#DC2626'}},
                    dt.length,' / ',cov.target,' needed'
                  )
                ),
                dt.map(tech => {
                  const {locOk, typeOk, ok} = compat(tech, doc);
                  const warnings = [];
                  if (!locOk) warnings.push('Location mismatch — tech is not based nearby and not marked as willing to travel');
                  if (!typeOk) warnings.push('Clinic type mismatch — tech may not be trained for this specialty');
                  return React.createElement('div', {
                    key:tech.id,
                    className:'tech-chip'+(drag?.techId===tech.id?' dragging':''),
                    style:{background:ok?'#f9fafb':'#FFFBEB', borderColor:ok?'#e5e7eb':'#FDE68A'},
                    draggable:true,
                    onDragStart:e=>onDragStart(e,tech.id,doc.id),
                    onDragEnd:onDragEnd,
                  },
                    React.createElement('span',{className:'tech-chip-name'},
                      tech.name,
                      tech.cred&&React.createElement('span',{className:'tech-chip-cred'},tech.cred)
                    ),
                    tech.scribes&&React.createElement('span',{className:'tag tag-scribe',style:{fontSize:9,padding:'1px 5px'}},'scribe'),
                    !ok&&React.createElement('span',{className:'tag',title:warnings.join(' | '),style:{background:'#FEF3C7',color:'#92400E',cursor:'help',fontSize:9,padding:'1px 6px'}},'⚠ check'),
                    React.createElement('button',{className:'remove-btn',title:'Remove from team',onClick:()=>removeTech(tech.id)},'×')
                  );
                }),
                dt.length===0 && React.createElement('div',{
                  className:'empty-drop',
                  style:{color:isTgt?s.a:'#9ca3af',borderColor:isTgt?s.a:'#d1d5db',background:isTgt?s.bg:'transparent'}
                },isTgt?'↓ Drop to assign':'Drag technicians here'),
                dt.length>0&&isTgt&&React.createElement('div',{
                  className:'add-more-drop',
                  style:{color:s.a,borderColor:s.a}
                },'↓ Add to team')
              )
            ); // end doc-card
          })
        )
      ) // end doctor grid
    ), // end main

    /* LEGEND */
    React.createElement('div',{className:'legend'},
      React.createElement('strong',{style:{color:'#374151'}},'Coverage:'),
      React.createElement('div',{className:'legend-item'},React.createElement('div',{className:'legend-dot',style:{background:'#DC2626'}}),React.createElement('span',null,'Below minimum (red badge)')),
      React.createElement('div',{className:'legend-item'},React.createElement('div',{className:'legend-dot',style:{background:'#D97706'}}),React.createElement('span',null,'Between min & ideal (amber)')),
      React.createElement('div',{className:'legend-item'},React.createElement('div',{className:'legend-dot',style:{background:'#059669'}}),React.createElement('span',null,'Fully covered (green)')),
      React.createElement('span',{style:{color:'#e5e7eb'}},'|'),
      React.createElement('span',null,'⚠ check = mismatch — hover chip for detail'),
      React.createElement('span',{style:{color:'#e5e7eb'}},'|'),
      React.createElement('span',null,'Drag chips between cards to reassign'),
      React.createElement('div',{style:{flex:1}}),
      React.createElement('span',{style:{color:'#d1d5db',fontSize:10}},'Import/Export saves all assignments, schedules & location edits')
    ),

    /* TOAST */
    toast && React.createElement('div',{className:'toast'},toast)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
